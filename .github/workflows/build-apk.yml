name: Build Android APK

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    name: Build Ojugo APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.9'

    - name: Generate Wrapper if Missing
      run: |
        if [ ! -f gradlew ]; then
          echo "⚠️ gradlew is absent. Generating gradle-wrapper..."
          gradle wrapper --gradle-version 8.9
        fi
        chmod +x gradlew

    - name: Compile Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Ojugo-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
